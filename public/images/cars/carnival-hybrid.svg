    <circle cx="264.0" cy="146.39999999999998" r="20" fill="#b0b8c4" stroke="#1b2a4a" stroke-width="1.5" opacity="0.6"/>
    <!-- windows -->
    <rect x="88.0" y="28" width="77.0" height="30" rx="4" fill="#e8ecf2" opacity="0.5"/>
    <rect x="176.0" y="28" width="77.0" height="30" rx="4" fill="#e8ecf2" opacity="0.5"/>
  </g>
  <text x="200" y="238" text-anchor="middle" font-family="Pretendard,sans-serif" font-size="13" font-weight="700" fill="#1b2a4a" opacity="0.8">기아 카니발</text>
