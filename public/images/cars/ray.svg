<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f2f6"/>
      <stop offset="100%" stop-color="#e2e6ee"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg)"/>
  <g transform="translate(50,40)">
    <!-- body -->
    <rect x="0" y="55" width="225" height="72.0" rx="12" fill="#c4cfe0" opacity="0.7"/>
    <!-- cabin -->
    <rect x="30.0" y="20" width="165.0" height="50" rx="10" fill="#c4cfe0" opacity="0.9"/>
    <!-- roof -->
    <rect x="60.0" y="8" width="135.0" height="28" rx="8" fill="#c4cfe0" opacity="0.6"/>
    <!-- wheels -->
    <circle cx="45.0" cy="144.0" r="20" fill="#b0b8c4" stroke="#1b2a4a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="180.0" cy="144.0" r="20" fill="#b0b8c4" stroke="#1b2a4a" stroke-width="1.5" opacity="0.6"/>
    <!-- windows -->
    <rect x="60.0" y="28" width="52.5" height="30" rx="4" fill="#e8ecf2" opacity="0.5"/>
    <rect x="120.0" y="28" width="52.5" height="30" rx="4" fill="#e8ecf2" opacity="0.5"/>
  </g>
  <text x="200" y="238" text-anchor="middle" font-family="Pretendard,sans-serif" font-size="13" font-weight="700" fill="#1b2a4a" opacity="0.8">기아 레이</text>
</svg>